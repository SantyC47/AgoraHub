<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgoraHub</title>
    
    <script type="module">
        import { io } from 'https://cdn.socket.io/4.3.2/socket.io.esm.min.js'

        const socket = io()

        console.log("Intentando conectar al servidor...");

        socket.on('connect', () => {
            console.log("¡Conectado al servidor!");
        });

        socket.on('historial', (mensajesDB) => {
            mensajesDB.forEach(msg => {
                const item = `<li>${msg.content}</li>`;
                messages.insertAdjacentHTML('beforeend', item);
                
                //BAJA AL FINAL AL CARGAR
                messages.scrollTop = messages.scrollHeight;
            });
        });

        

        const form = document.getElementById('form')
        const input = document.getElementById('input')
        const messages = document.getElementById('messages')

        socket.on('chat message', (msg) => {
            const isAtBottom = messages.scrollHeight - messages.scrollTop <= messages.clientHeight + 10;

            const item = `<li>${msg}</li>`;
            messages.insertAdjacentHTML('beforeend', item);

            if (isAtBottom) {
                messages.scrollTop = messages.scrollHeight;
            }
        })

        form.addEventListener('submit', (e) => {
            e.preventDefault()

            if(input.value){
                socket.emit('chat message', input.value)
                input.value = '' 
            }
            
        })
        
    </script>

    <style>
        *,
        *::before,
        *::after{
            box-sizing: border-box;
        }

        :root {
            color-scheme: light dark;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: grid;
            place-content: center;
            height: 100vh;
            padding: 36px 36px 100px 36px;
            grid-template-rows: 1fr;
        }

        #messages {
            list-style-type: none;
            margin: 0;
            padding: 0;

            flex: 1;
            overflow-y: auto;
        }

        #messages > li{
            padding: .5rem 1rem;
        }

        #messages > li:nth-child(odd){
            background: #000;
        }

        #messages {
            list-style-type: none;
            margin: 0;
            padding: 0;

            overflow-y: auto;
            height: 100%;    
        }

        #messages {
            scroll-behavior: smooth;
        }

        #chat {
            border: 1px solid #ccc;
            border-radius: 4px;
            overflow: hidden;
            width: 350px;
            height: 100%;

            display: flex;
            flex-direction: column;
        }

        #form {
            bottom: 0;
            display: flex;
            height: 48px;
            left: 0;
            padding: 4px;
            position: absolute;
            right: 0;
        }

        #input{
            border-radius: 9999px;
            border: 1px solid #eee;
            flex: 1;
            margin: 4px;
            padding: 0 8px;
        }

        #input:focus{
            outline: 0;
        }

        #form > button {
            background: #09f;
            color: #fff;
            border: 0;
            margin: 4px;
            border-radius: 4px;
        }

        #form > button:hover{
            background: #0cf;
        }
    </style>
</head>
<body>
    <section id="chat">
        <ul id="messages">
            
        </ul>
        <form id="form">
            <input type="text" name="message" id="input" placeholder="Type a message" autocomplete="off" />
            <button type="submit">Enviar</button>
        </form>
    </section>
</body>
</html>
